name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md frontmatter
        run: |
          errors=0
          for skill_dir in skills/*/; do
            skill_file="${skill_dir}SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "ERROR: Missing SKILL.md in $skill_dir"
              errors=$((errors + 1))
              continue
            fi

            # Check required frontmatter fields
            for field in name description version metadata; do
              if ! head -30 "$skill_file" | grep -q "^${field}:"; then
                echo "ERROR: $skill_file missing required field: $field"
                errors=$((errors + 1))
              fi
            done

            # Check metadata is single-line JSON (OpenClaw parser requirement)
            metadata_line=$(grep '^metadata:' "$skill_file" || true)
            if [ -n "$metadata_line" ]; then
              if ! echo "$metadata_line" | grep -q '{.*}'; then
                echo "ERROR: $skill_file metadata must be single-line JSON for OpenClaw parser"
                errors=$((errors + 1))
              fi
            fi

            echo "OK: $skill_file"
          done

          if [ $errors -gt 0 ]; then
            echo "FAILED: $errors validation error(s)"
            exit 1
          fi
          echo "All skills validated successfully"

  e2e-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  publish-npm:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [unit-test, validate-skills]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-clawhub:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [unit-test, validate-skills]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Sync skill versions with tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for skill_dir in skills/*/; do
            skill_file="${skill_dir}SKILL.md"
            if [ -f "$skill_file" ]; then
              sed -i "s/^version: .*/version: ${VERSION}/" "$skill_file"
              echo "Updated $skill_file to version $VERSION"
            fi
          done

      - name: Publish skills to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          publish_skill() {
            local dir=$1
            local slug=$2
            local name=$3

            echo "Publishing $slug v$VERSION..."
            clawhub publish "$dir" \
              --slug "$slug" \
              --name "$name" \
              --version "$VERSION" \
              --changelog "Release $VERSION" \
              --tags latest
          }

          publish_skill "skills/crowdlisten-search" \
            "crowdlisten-search" \
            "CrowdListen Search"

          publish_skill "skills/crowdlisten-comments" \
            "crowdlisten-comments" \
            "CrowdListen Comments"

          publish_skill "skills/crowdlisten-analyze" \
            "crowdlisten-analyze" \
            "CrowdListen Analyze"

          publish_skill "skills/crowdlisten-deep-analysis" \
            "crowdlisten-deep-analysis" \
            "CrowdListen Deep Analysis"

          echo "All skills published to ClawHub"
